<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>dropscp</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">dropscp</div>
    <div class="session-info" id="session-info">not connected</div>
    <button id="connect-btn">Connect</button>
    <button id="disconnect-btn" hidden>Disconnect</button>
  </header>

  <main class="panes">
    <section class="pane" id="pane-remote">
      <header>
        <span class="pane-title">Remote</span>
        <div class="path" id="remote-path" title="">—</div>
        <div class="actions">
          <button data-action="up" data-side="remote" title="Parent directory">..</button>
          <button data-action="mkdir" data-side="remote" title="New folder">mkdir</button>
          <button data-action="refresh" data-side="remote" title="Refresh">↻</button>
        </div>
      </header>
      <ul class="tree" id="remote-tree">
        <li class="empty">connect to a host to browse</li>
      </ul>
    </section>

    <section class="pane" id="pane-local">
      <header>
        <span class="pane-title">Local</span>
        <div class="path" id="local-path" title="">—</div>
        <div class="actions">
          <button data-action="up" data-side="local" title="Parent directory">..</button>
          <button data-action="mkdir" data-side="local" title="New folder">mkdir</button>
          <button data-action="refresh" data-side="local" title="Refresh">↻</button>
        </div>
      </header>
      <ul class="tree" id="local-tree"></ul>
    </section>
  </main>

  <dialog id="login-dialog">
    <form id="login-form" method="dialog" autocomplete="off">
      <h3>Connect</h3>
      <label>username <input name="username" required autocomplete="off" /></label>
      <label>host <input name="host" required autocomplete="off" placeholder="hostname or IP" /></label>
      <label>port <input name="port" type="number" min="1" max="65535" value="22" /></label>
      <label>password <input name="password" type="password" required /></label>
      <div class="row">
        <button type="button" id="login-cancel">Cancel</button>
        <button type="submit">Connect</button>
      </div>
      <div class="error" id="login-error" hidden></div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
