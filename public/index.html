<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>dropscp</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">dropscp</div>
    <div class="tabs" id="tabs" role="tablist"></div>
    <button id="connect-btn" class="tab-add" title="New connection">+</button>
    <button id="r2r-toggle" class="r2r-toggle" title="Remote → Remote mode (needs 2+ tabs)" disabled>R2R</button>
  </header>

  <main class="panes">
    <section class="pane" id="pane-remote" data-side="remote">
      <header>
        <span class="pane-title">Remote</span>
        <div class="path" id="remote-path" title="">—</div>
        <div class="actions">
          <button data-action="up" data-side="remote" title="Parent directory">..</button>
          <button data-action="mkdir" data-side="remote" title="New folder">mkdir</button>
          <button data-action="refresh" data-side="remote" title="Refresh">↻</button>
        </div>
      </header>
      <ul class="tree" id="remote-tree" data-side="remote">
        <li class="empty">connect to a host to browse</li>
      </ul>
    </section>

    <div class="splitter" id="pane-splitter" role="separator" aria-orientation="vertical" title="Drag to resize"></div>

    <section class="pane" id="pane-local" data-side="local">
      <header>
        <span class="pane-title" id="right-title">Local</span>
        <select id="r2r-host-select" class="r2r-host-select" title="Pick destination host" hidden></select>
        <div class="path" id="local-path" title="">—</div>
        <div class="actions">
          <button data-action="up" data-side="local" title="Parent directory">..</button>
          <button data-action="mkdir" data-side="local" title="New folder">mkdir</button>
          <button data-action="refresh" data-side="local" title="Refresh">↻</button>
        </div>
      </header>
      <ul class="tree" id="local-tree" data-side="local"></ul>
    </section>
  </main>

  <footer class="status-bar" id="status-bar" hidden>
    <div class="status-header">
      <div class="status-text" id="status-text">—</div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="status-meta" id="status-meta"></div>
    </div>
    <ul class="transfer-list" id="transfer-list"></ul>
  </footer>

  <dialog id="login-dialog">
    <form id="login-form" method="dialog" autocomplete="off">
      <h3>Connect</h3>
      <div class="preset-row">
        <label>preset
          <select id="preset-select"><option value="">(none)</option></select>
        </label>
        <button type="button" id="preset-delete" title="Delete selected preset">✕</button>
      </div>
      <label>username <input name="username" required autocomplete="off" /></label>
      <label>host <input name="host" required autocomplete="off" placeholder="hostname or IP" /></label>
      <label>port <input name="port" type="number" min="1" max="65535" value="22" /></label>
      <label>password <input name="password" type="password" required /></label>
      <div class="row">
        <button type="button" id="preset-save">Save as preset</button>
        <span class="spacer"></span>
        <button type="button" id="login-cancel">Cancel</button>
        <button type="submit" class="primary">Connect</button>
      </div>
      <div class="error" id="login-error" hidden></div>
    </form>
  </dialog>

  <dialog id="conflict-dialog">
    <div class="conflict-body">
      <h3>Already exists</h3>
      <p id="conflict-message"></p>
      <div class="row">
        <button type="button" data-conflict="cancel">Cancel</button>
        <button type="button" data-conflict="skip">Skip</button>
        <button type="button" data-conflict="overwrite" class="primary">Overwrite</button>
      </div>
    </div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
